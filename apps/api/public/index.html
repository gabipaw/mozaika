<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mozaika</title>
    <meta
      name="description"
      content="Recenzje wszystkich mediów i rekomendacje przez dopasowanie gustu."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e14" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">🎨 <span>Mozaika</span></div>
      <div id="userBox" class="userbox hidden">
        <button id="hello" class="hello-link" type="button" title="Twój profil"></button>
        <button id="logout" type="button">Wyloguj</button>
      </div>
    </header>

    <main>
      <!-- Ekran logowania / rejestracji -->
      <section id="authView" class="auth">
        <div class="auth-card">
          <div class="auth-head">
            <div class="auth-logo">🎨</div>
            <h1 class="auth-title">Mozaika</h1>
            <p class="auth-tagline">
              Oceniaj wszystko, co oglądasz i czytasz,<br />
              a resztę dobierzemy do Twojego gustu.
            </p>
          </div>

          <form id="authForm" autocomplete="on">
            <input
              id="displayName"
              class="hidden"
              placeholder="Twoja nazwa"
              autocomplete="name"
            />
            <input
              id="email"
              type="email"
              placeholder="E-mail"
              autocomplete="email"
              required
            />
            <div class="pw-field">
              <input
                id="password"
                type="password"
                placeholder="Hasło"
                autocomplete="current-password"
                required
              />
              <button
                id="pwToggle"
                type="button"
                class="pw-toggle"
                aria-label="Pokaż hasło"
              ></button>
            </div>
            <button id="authSubmit" type="submit">Zaloguj się</button>
          </form>
          <p id="authMsg" class="err"></p>
          <p class="auth-switch">
            <span id="switchText">Nie masz jeszcze konta?</span>
            <button id="switchBtn" type="button" class="linkbtn">Załóż konto</button>
          </p>
        </div>
      </section>

      <!-- Aplikacja (po zalogowaniu) -->
      <div id="appView" class="hidden">
        <div class="searchwrap">
          <div class="type-toggle">
            <button id="typeFilm" class="type active" type="button">🎬 Filmy</button>
            <button id="typeBook" class="type" type="button">📚 Książki</button>
            <button id="typeManga" class="type" type="button">📗 Manga</button>
            <button id="typeAnime" class="type" type="button">🎞️ Anime</button>
            <button id="typeMusic" class="type" type="button">🎵 Muzyka</button>
          </div>
          <input
            id="search"
            type="search"
            placeholder="Szukaj filmu (TMDB)…"
            autocomplete="off"
          />
        </div>

        <!-- Wyniki wyszukiwania — od razu pod wyszukiwarką -->
        <section id="searchResults" class="hidden">
          <h2 id="searchTitle">Wyniki</h2>
          <div id="searchGrid" class="poster-grid"></div>
        </section>

        <!-- Przeglądanie (chowane podczas wyszukiwania) -->
        <div id="browse">
          <section>
            <h2>Dla Ciebie</h2>
            <p class="hint">Polecane przez osoby o podobnym guście.</p>
            <div id="recs" class="poster-row"></div>
          </section>

          <section id="profile">
            <div class="section-head">
              <h2>Twój profil</h2>
              <div class="match">
                <span>dopasowanie z</span>
                <select id="other" aria-label="Drugi użytkownik"></select>
                <button id="matchBtn" type="button">?</button>
                <span id="matchResult" class="match-result"></span>
              </div>
            </div>
            <p id="profileStats" class="hint"></p>
            <div id="myReviews" class="poster-grid"></div>
          </section>

          <section>
            <h2>Katalog</h2>
            <div id="catalog" class="poster-grid"></div>
          </section>
        </div>
      </div>

      <p id="reviewMsg" class="toast"></p>
    </main>

    <!-- Szczegóły tytułu: opis + ocena + komentarz -->
    <div id="detailOverlay" class="overlay hidden">
      <div class="modal" role="dialog" aria-modal="true">
        <button id="detailClose" class="modal-close" type="button" aria-label="Zamknij">
          ✕
        </button>
        <div class="modal-head">
          <div id="detailPoster" class="modal-poster"></div>
          <div class="modal-info">
            <h2 id="detailTitle"></h2>
            <div id="detailYear" class="modal-year"></div>
            <p id="detailDesc" class="modal-desc"></p>
          </div>
        </div>

        <div class="modal-form">
          <div class="modal-rateline">
            <label>Twoja ocena</label>
            <div id="detailStars" class="stars" role="slider" aria-label="Ocena"></div>
            <span id="detailStarVal" class="starval"></span>
          </div>
          <textarea
            id="detailComment"
            rows="3"
            placeholder="Napisz komentarz (opcjonalnie)…"
          ></textarea>
          <button id="detailSave" type="button">Zapisz ocenę</button>
          <p id="detailMsg" class="err"></p>
        </div>

        <div class="modal-reviews">
          <h3>Komentarze</h3>
          <div id="detailReviews"></div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
