<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mozaika</title>
    <meta
      name="description"
      content="Recenzje wszystkich mediów i rekomendacje przez dopasowanie gustu."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e14" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">🎨 <span>Mozaika</span></div>
      <div id="userBox" class="userbox hidden">
        <button id="hello" class="hello-link" type="button" title="Twój profil"></button>
        <button id="logout" type="button">Wyloguj</button>
      </div>
    </header>

    <main>
      <!-- Ekran logowania / rejestracji -->
      <section id="authView" class="auth">
        <div class="card auth-card">
          <div class="tabs">
            <button id="tabLogin" class="tab active" type="button">Zaloguj</button>
            <button id="tabRegister" class="tab" type="button">Załóż konto</button>
          </div>
          <form id="authForm" autocomplete="on">
            <input
              id="displayName"
              class="hidden"
              placeholder="Twoja nazwa"
              autocomplete="name"
            />
            <input
              id="email"
              type="email"
              placeholder="E-mail"
              autocomplete="email"
              required
            />
            <input
              id="password"
              type="password"
              placeholder="Hasło (min. 6 znaków)"
              autocomplete="current-password"
              required
            />
            <button id="authSubmit" type="submit">Zaloguj</button>
          </form>
          <p id="authMsg" class="err"></p>
          <p class="muted small">
            Załóż konto i oceniaj filmy — Twój gust dobierze Ci rekomendacje.
          </p>
        </div>
      </section>

      <!-- Aplikacja (po zalogowaniu) -->
      <div id="appView" class="hidden">
        <div class="searchwrap">
          <input
            id="search"
            type="search"
            placeholder="Szukaj dowolnego filmu (TMDB)…"
            autocomplete="off"
          />
        </div>

        <section>
          <h2>Dla Ciebie</h2>
          <p class="hint">Polecane przez osoby o podobnym guście.</p>
          <div id="recs" class="poster-row"></div>
        </section>

        <section id="profile">
          <div class="section-head">
            <h2>Twój profil</h2>
            <div class="match">
              <span>dopasowanie z</span>
              <select id="other" aria-label="Drugi użytkownik"></select>
              <button id="matchBtn" type="button">?</button>
              <span id="matchResult" class="match-result"></span>
            </div>
          </div>
          <p id="profileStats" class="hint"></p>
          <div id="myReviews" class="poster-grid"></div>
        </section>

        <section>
          <h2 id="catalogTitle">Katalog</h2>
          <div id="catalog" class="poster-grid"></div>
        </section>
      </div>

      <p id="reviewMsg" class="toast"></p>
    </main>

    <footer><p class="muted">Mozaika — projekt stażowy · dane z TMDB</p></footer>

    <script src="/app.js"></script>
  </body>
</html>
