# Render Blueprint — hosting Mozaiki (API + PWA z jednego serwera).
# Deploy: w panelu Render → New → Blueprint → wskaż to repo.
# Sekrety (DATABASE_URL, DIRECT_URL) uzupełnij w panelu — NIE trzymamy ich w repo.
services:
  - type: web
    name: mozaika
    runtime: node
    plan: free
    region: frankfurt
    # --include=dev: Render domyślnie ustawia NODE_ENV=production i pomija devDependencies,
    # a build potrzebuje prisma + typescript. Build kompiluje TS do dist/.
    buildCommand: npm install --include=dev && npm run build --workspace=@mozaika/api
    # Uruchamiamy skompilowany serwer z katalogu apps/api (żeby ./public się zgadzało).
    startCommand: cd apps/api && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # uzupełnij w panelu Render (Environment)
      - key: DIRECT_URL
        sync: false # uzupełnij w panelu Render (Environment)
      - key: TMDB_API_KEY
        sync: false # klucz TMDB v3 — do wyszukiwarki filmów
      - key: RAWG_API_KEY
        sync: false # klucz RAWG — do wyszukiwarki gier (rawg.io/apikey)
      - key: DEEPL_API_KEY
        # klucz DeepL (plan free, deepl.com/pro-api) — tłumaczenie czatu/recenzji.
        # Bez niego przycisk „Przetłumacz" się nie pokazuje, reszta działa normalnie.
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false # Web Push — klucz publiczny (uzupełnij w panelu Render)
      - key: VAPID_PRIVATE_KEY
        sync: false # Web Push — klucz prywatny (SEKRET, tylko panel Render)
      - key: VAPID_SUBJECT
        sync: false # np. mailto:twoj@email — wymagane przez bramki push
      - key: CRON_SECRET
        sync: false # sekret dla /api/cron/premieres — ten sam wpisz w GitHub → Secrets
      - key: GMAIL_USER
        # Adres Gmaila, z którego wychodzą maile z linkiem „nie pamiętam hasła".
        sync: false
      - key: GMAIL_APP_PASSWORD
        # HASŁO APLIKACJI z konta Google (Bezpieczeństwo → Hasła aplikacji), NIE zwykłe
        # hasło. Bez tej pary reset hasła nie wysyła maili, reszta apki działa normalnie.
        sync: false
      - key: JWT_SECRET
        sync: false # SEKRET do podpisu tokenow — WYMAGANY, bez niego serwer nie wstanie
        # Wygeneruj np.: node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
