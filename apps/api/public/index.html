<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mozaika</title>
    <meta
      name="description"
      content="Recenzje wszystkich mediów i rekomendacje przez dopasowanie gustu."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e14" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">🎨 <span>Mozaika</span></div>
        <button id="topBack" class="topback hidden" type="button">← Wróć</button>
      </div>
      <div id="userBox" class="userbox hidden">
        <button id="hello" class="hello-link" type="button" title="Twój profil"></button>
        <button id="logout" type="button">Wyloguj</button>
      </div>
    </header>

    <main>
      <!-- Ekran logowania / rejestracji -->
      <section id="authView" class="auth">
        <div class="auth-card">
          <div class="auth-head">
            <div class="auth-logo">🎨</div>
            <h1 class="auth-title">Mozaika</h1>
            <p class="auth-tagline">
              Oceniaj wszystko, co oglądasz i czytasz,<br />
              a resztę dobierzemy do Twojego gustu.
            </p>
          </div>

          <form id="authForm" autocomplete="on">
            <input
              id="displayName"
              class="hidden"
              placeholder="Twoja nazwa"
              autocomplete="name"
            />
            <input
              id="email"
              type="email"
              placeholder="E-mail"
              autocomplete="email"
              required
            />
            <div class="pw-field">
              <input
                id="password"
                type="password"
                placeholder="Hasło"
                autocomplete="current-password"
                required
              />
              <button
                id="pwToggle"
                type="button"
                class="pw-toggle"
                aria-label="Pokaż hasło"
              ></button>
            </div>
            <button id="authSubmit" type="submit">Zaloguj się</button>
          </form>
          <p id="authMsg" class="err"></p>
          <p class="auth-switch">
            <span id="switchText">Nie masz jeszcze konta?</span>
            <button id="switchBtn" type="button" class="linkbtn">Załóż konto</button>
          </p>
        </div>
      </section>

      <!-- Aplikacja (po zalogowaniu) -->
      <div id="appView" class="hidden">
        <div id="searchbar" class="searchwrap">
          <div class="type-toggle">
            <button id="typeFilm" class="type active" type="button">🎬 Filmy</button>
            <button id="typeBook" class="type" type="button">📚 Książki</button>
            <button id="typeManga" class="type" type="button">📗 Manga</button>
            <button id="typeAnime" class="type" type="button">🎞️ Anime</button>
            <button id="typeMusic" class="type" type="button">🎵 Muzyka</button>
            <button id="typeGame" class="type" type="button">🎮 Gry</button>
          </div>
          <input
            id="search"
            type="search"
            placeholder="Szukaj filmu (TMDB)…"
            autocomplete="off"
          />
        </div>

        <!-- Wyniki wyszukiwania — od razu pod wyszukiwarką -->
        <section id="searchResults" class="hidden">
          <h2 id="searchTitle">Wyniki</h2>
          <div id="searchGrid" class="poster-grid"></div>
        </section>

        <!-- Przeglądanie (chowane podczas wyszukiwania) -->
        <div id="browse">
          <section>
            <h2>Dla Ciebie</h2>
            <p class="hint">Polecane przez osoby o podobnym guście.</p>
            <div id="recs" class="poster-row"></div>
          </section>

          <section>
            <h2>Katalog</h2>
            <div id="catalog" class="poster-grid"></div>
          </section>
        </div>

        <!-- Szczegóły tytułu jako pełna strona (opis + ocena + komentarze) -->
        <section id="detailView" class="detail-page hidden">
          <div class="detail-layout">
            <div id="detailPoster" class="detail-poster"></div>
            <div class="detail-main">
              <h1 id="detailTitle"></h1>
              <div id="detailYear" class="detail-year"></div>
              <p id="detailDesc" class="detail-desc"></p>

              <div class="detail-rateline">
                <span class="detail-label">Twoja ocena</span>
                <div
                  id="detailStars"
                  class="stars"
                  role="slider"
                  aria-label="Ocena"
                ></div>
                <span id="detailStarVal" class="starval"></span>
              </div>

              <div class="detail-actions">
                <button id="favBtn" type="button" class="chip">☆ TOP 4</button>
                <button id="watchBtn" type="button" class="chip">＋ Do listy</button>
              </div>

              <div class="detail-write">
                <textarea
                  id="detailComment"
                  rows="3"
                  placeholder="Napisz komentarz (opcjonalnie)…"
                ></textarea>
                <button id="detailSave" type="button">Zapisz ocenę i komentarz</button>
                <p id="detailMsg" class="err"></p>
              </div>
            </div>
          </div>

          <div class="detail-comments">
            <h3>Komentarze</h3>
            <div id="detailReviews"></div>
          </div>
        </section>

        <!-- Twój profil (osobna strona) -->
        <section id="profileView" class="detail-page hidden">
          <div class="profile-cols">
            <div class="profile-left">
              <div class="profile-head">
                <button id="avatarBtn" class="avatar" type="button" title="Zmień zdjęcie">
                  <img id="avatarImg" class="hidden" alt="" />
                  <span id="avatarInitial"></span>
                </button>
                <input id="avatarFile" type="file" accept="image/*" class="hidden" />
                <h1 id="profileName"></h1>
              </div>
              <h2 class="profile-h">Top 4 ulubione</h2>
              <div id="topMedia" class="poster-grid"></div>
              <h2 class="profile-h">
                Do obejrzenia / zagrania
                <button id="watchSeeAll" class="seeall hidden" type="button">
                  Zobacz wszystko
                </button>
              </h2>
              <div id="watchlist" class="poster-grid"></div>
            </div>
            <div class="profile-right">
              <div id="ratedByCat"></div>
            </div>
          </div>
        </section>
      </div>

      <!-- Nakładka „Zobacz wszystko" — pełna siatka danego typu / listy -->
      <div id="seeAllOverlay" class="overlay hidden">
        <div class="overlay-card">
          <div class="overlay-head">
            <h2 id="seeAllTitle"></h2>
            <button id="seeAllClose" class="overlay-close" type="button">✕ Zamknij</button>
          </div>
          <div id="seeAllGrid" class="poster-grid"></div>
        </div>
      </div>

      <p id="reviewMsg" class="toast"></p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
