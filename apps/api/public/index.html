<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mozaika</title>
    <meta
      name="description"
      content="Recenzje wszystkich mediów i rekomendacje przez dopasowanie gustu."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e14" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">🎨 <span>Mozaika</span></div>
      <div class="who">
        <span>jako</span>
        <select id="user" aria-label="Wybierz użytkownika"></select>
      </div>
    </header>

    <main>
      <div class="searchwrap">
        <input
          id="search"
          type="search"
          placeholder="Szukaj tytułu w katalogu…"
          autocomplete="off"
        />
      </div>

      <section>
        <h2>Dla Ciebie</h2>
        <p class="hint">Polecane przez osoby o podobnym guście.</p>
        <div id="recs" class="poster-row">
          <p class="muted">Ładowanie…</p>
        </div>
      </section>

      <section>
        <div class="section-head">
          <h2>Katalog</h2>
          <div class="match">
            <span>dopasowanie z</span>
            <select id="other" aria-label="Drugi użytkownik"></select>
            <button id="matchBtn" type="button">?</button>
            <span id="matchResult" class="match-result"></span>
          </div>
        </div>
        <div id="catalog" class="poster-grid"></div>
        <p id="reviewMsg" class="toast"></p>
      </section>
    </main>

    <footer><p class="muted">Mozaika — projekt stażowy · dane z TMDB</p></footer>

    <script src="/app.js"></script>
  </body>
</html>
